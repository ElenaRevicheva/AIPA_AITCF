name: Deploy EspaLuz hotfix to Oracle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/espaluz-hotfixes/**'
      - '.github/workflows/deploy-espaluz-hotfix.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy kinder preference fix on Oracle
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 170.9.242.90
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/ubuntu/AIPA_AITCF
            git fetch origin main
            git checkout origin/main -- scripts/espaluz-hotfixes/
            bash scripts/espaluz-hotfixes/deploy-kinder-fix-on-oracle.sh
            sudo systemctl status espaluz-whatsapp --no-pager | head -15
            curl -s -o /dev/null -w "webhook HTTP %{http_code}\n" http://127.0.0.1:8081/webhook
