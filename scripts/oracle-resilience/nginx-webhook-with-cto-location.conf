# Reference: /etc/nginx/sites-available/webhook on Oracle (170.9.242.90)
# The /cto/ location proxies to CTO AIPA (PM2, port 3000).
# Public base URL: https://webhook.aideazz.xyz/cto
# Restore: sudo cp /etc/nginx/sites-available/webhook.bak.* /etc/nginx/sites-available/webhook && sudo nginx -t && sudo systemctl reload nginx

server {
    server_name webhook.aideazz.xyz;

    location /espaluz/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /cto/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/webhook.aideazz.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webhook.aideazz.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = webhook.aideazz.xyz) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name webhook.aideazz.xyz;
    return 404;
}
